{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-lg-8 mx-auto">
        <h2 class="mb-4"><i class="fas fa-camera"></i> Capture Photo</h2>
        
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        {% if not model_loaded %}
        <div class="alert alert-info">
            <i class="fas fa-info-circle"></i> 
            Running in demo mode. Camera capture will show example predictions.
        </div>
        {% endif %}

        <div class="card">
            <div class="card-body">
                <div class="text-center">
                    <div id="camera-container" class="mb-3">
                        <video id="video" width="100%" height="auto" autoplay playsinline style="max-width: 100%; border: 2px solid #dee2e6; border-radius: 8px;"></video>
                        <canvas id="canvas" style="display:none;"></canvas>
                    </div>
                    
                    <div class="btn-group" role="group">
                        <button id="capture-btn" class="btn btn-success">
                            <i class="fas fa-camera"></i> Capture Photo
                        </button>
                        <button id="retake-btn" class="btn btn-warning" style="display:none;">
                            <i class="fas fa-redo"></i> Retake
                        </button>
                    </div>
                    
                    <form id="upload-form" method="post" style="display:none;">
                        <input type="hidden" id="image-data" name="image_data">
                        <div class="mt-3">
                            <img id="captured-image" class="img-fluid rounded mb-3" alt="Captured Image" style="max-height: 400px; border: 2px solid #dee2e6; border-radius: 8px;">
                            <div>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-search"></i> Analyze This Image
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('capture-btn');
    const retakeBtn = document.getElementById('retake-btn');
    const uploadForm = document.getElementById('upload-form');
    const imageDataInput = document.getElementById('image-data');
    const capturedImage = document.getElementById('captured-image');
    const context = canvas.getContext('2d');

    // Access camera
    navigator.mediaDevices.getUserMedia({ video: true, audio: false })
        .then(function(stream) {
            video.srcObject = stream;
        })
        .catch(function(err) {
            console.error("Error accessing camera: ", err);
            alert("Error accessing camera. Please make sure you've granted camera permissions.");
        });

    // Capture photo
    captureBtn.addEventListener('click', function() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const dataURL = canvas.toDataURL('image/jpeg');
        capturedImage.src = dataURL;
        imageDataInput.value = dataURL;
        
        uploadForm.style.display = 'block';
        captureBtn.style.display = 'none';
        retakeBtn.style.display = 'inline-block';
        
        // Stop video stream
        const stream = video.srcObject;
        const tracks = stream.getTracks();
        tracks.forEach(track => track.stop());
    });

    // Retake photo
    retakeBtn.addEventListener('click', function() {
        uploadForm.style.display = 'none';
        captureBtn.style.display = 'inline-block';
        retakeBtn.style.display = 'none';
        
        // Restart camera
        navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then(function(stream) {
                video.srcObject = stream;
            })
            .catch(function(err) {
                console.error("Error accessing camera: ", err);
            });
    });
});
</script>
{% endblock %}
